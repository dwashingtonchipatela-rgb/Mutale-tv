<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- White background -->
  <rect width="200" height="220" fill="#ffffff"/>

  <!-- Graduation board — flat top of hat -->
  <rect x="50" y="52" width="100" height="12" rx="3" fill="#1557b0"/>

  <!-- Graduation hat top -->
  <rect x="88" y="30" width="24" height="26" rx="3" fill="#1a73e8"/>

  <!-- Graduation hat board shadow line -->
  <rect x="50" y="58" width="100" height="3" rx="1" fill="#0d47a1"/>

  <!-- Tassel string -->
  <line x1="150" y1="58" x2="162" y2="82" stroke="#f4b400" stroke-width="3" stroke-linecap="round"/>

  <!-- Tassel ball -->
  <circle cx="162" cy="86" r="6" fill="#f4b400"/>

  <!-- Main blue circle -->
  <circle cx="100" cy="135" r="75" fill="#1a73e8"/>

  <!-- Inner circle subtle shadow -->
  <circle cx="100" cy="135" r="75" fill="none" stroke="#1557b0" stroke-width="4"/>

  <!-- Letter M -->
  <text x="100" y="178" font-family="Arial Black, sans-serif" font-size="90" font-weight="900" text-anchor="middle" fill="#ffffff">M</text>

  <!-- Mutale TV text -->
  <text x="100" y="208" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1a73e8" letter-spacing="3">MUTALE TV</text>
</svg>
